name: Terraform GH Runner Deployment

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "github-runners/terraform/autoscaling/**"

jobs:
  terraform_gh_runner:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: ./github-runners/terraform/autoscaling/gh-runners/base

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "1.5.7"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Decrypt the secrets
        run: |
          bash scripts/transcrypt -c aes-256-cbc -p ${{ secrets.TRANSCRYPT }} -y

      - name: Terraform init
        run: terraform init -upgrade

      - name: Validate terraform
        run: terraform validate

      - name: Terraform plan and apply
        run: |
          terraform plan -var-file=terraform.tfvars
          terraform apply -auto-approve -var-file=terraform.tfvars
